<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KPort Annotation Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Korean Portrait Annotation Viewer</h1>
<div id="filters">
    <label for="authorSelect">Author:</label>
    <select id="authorSelect"></select>
    <label for="objectSelect">Object:</label>
    <select id="objectSelect"></select>
</div>
<div id="container">
    <img id="image" src="seo016629-000-007.jpg" alt="Portrait">
    <canvas id="overlay"></canvas>
</div>
<button id="downloadBtn">Download JSON</button>
<script src="script.js"></script>
</body>
</html>
