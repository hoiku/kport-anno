<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Annotation Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Korean Portrait Annotation Viewer</h1>
<div id="controls">
    <label>Author
        <select id="authorFilter">
            <option value="">All</option>
        </select>
    </label>
    <label>Object
        <select id="objectFilter">
            <option value="">All</option>
        </select>
    </label>
</div>
<div id="viewer">
    <div id="imageContainer">
        <img id="image" src="seo016629-000-007.jpg" alt="Portrait">
        <canvas id="overlay"></canvas>
        <div id="tooltip" class="hidden"></div>
    </div>
    <aside id="infoPanel"></aside>
</div>
<button id="addBtn">Add Annotation</button>
<button id="downloadBtn">Download JSON</button>
<div id="modal" class="hidden">
    <div id="modalContent">
        <h2>New Annotation</h2>
        <form id="annotationForm">
            <label>Author
                <input type="text" name="author" required>
            </label>
            <label>Object
                <input type="text" name="object" required>
            </label>
            <label>Description
                <input type="text" name="description">
            </label>
            <label>Tags
                <input type="text" name="tags">
            </label>
            <div class="buttons">
                <button type="submit">Save</button>
                <button type="button" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
